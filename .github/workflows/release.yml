name: Release Obsidian Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build plugin
        run: npm run build

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if release exists
        id: check_release
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if gh release view "$VERSION" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION does not exist"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json version
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
            console.log('Updated manifest.json to version', '$VERSION');
          "

      - name: Update versions.json
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          MIN_APP_VERSION=$(node -p "require('./manifest.json').minAppVersion")
          node -e "
            const fs = require('fs');
            let versions = {};
            try {
              versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            } catch (e) {
              console.log('Creating new versions.json');
            }
            versions['$VERSION'] = '$MIN_APP_VERSION';
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, 2) + '\n');
            console.log('Updated versions.json');
          "

      - name: Commit version updates
        if: steps.check_release.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifest.json versions.json
          git diff --staged --quiet || git commit -m "Bump version to ${{ steps.get_version.outputs.version }}"
          git push

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: |
            ## Bulleted Markdown (BMD) ${{ steps.get_version.outputs.version }}
            
            ### Installation
            Download `main.js`, `manifest.json`, and `styles.css` and copy them to your vault:
            ```
            .obsidian/plugins/obsidian-bulleted-markdown/
            ```
            
            ### Files
            - `main.js` - Plugin code
            - `manifest.json` - Plugin metadata
            - `styles.css` - Card layout styles
          files: |
            main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
